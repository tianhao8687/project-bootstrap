name: Apply exact v1.8.3 source

on:
  push:
    branches:
      - agent/release-v1.8.3

permissions:
  contents: write

jobs:
  apply-exact-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct exact source files
        shell: bash
        run: |
          cat .release-exact/en__SKILL.md.part-* > en/SKILL.md
          cat .release-exact/en__THREE_MD_PIPELINE_SPEC.md.part-* > en/THREE_MD_PIPELINE_SPEC.md
          cat .release-exact/zh-CN__THREE_MD_PIPELINE_SPEC.md.part-* > zh-CN/THREE_MD_PIPELINE_SPEC.md

      - name: Remove temporary release machinery
        shell: bash
        run: |
          rm -rf .release-exact
          rm -f .github/workflows/apply-v1.8.3-exact.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true

      - name: Run v1.8.3 pressure test
        run: python tests/stress_test_reminder.py

      - name: Commit exact v1.8.3 source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: align exact v1.8.3 source"
          git push origin HEAD:agent/release-v1.8.3
