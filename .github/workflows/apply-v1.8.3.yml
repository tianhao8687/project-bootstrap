name: Apply v1.8.3 release patch

on:
  push:
    branches:
      - agent/release-v1.8.3

permissions:
  contents: write

jobs:
  apply-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and apply release patch
        shell: bash
        run: |
          cat .release/v1.8.3.patch.part-* > /tmp/v1.8.3.patch
          git apply --check /tmp/v1.8.3.patch
          git apply /tmp/v1.8.3.patch

      - name: Remove temporary release machinery
        shell: bash
        run: |
          rm -rf .release
          rm -f .github/workflows/apply-v1.8.3.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true

      - name: Run v1.8.3 pressure test
        run: python tests/stress_test_reminder.py

      - name: Commit exact v1.8.3 source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: publish v1.8.3"
          git push origin HEAD:agent/release-v1.8.3
